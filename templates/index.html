<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>X Feed</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>X Feed</h1>
    <button id="refresh-btn" aria-label="Refresh">&#8635;</button>
  </header>

  <nav id="keyword-nav">
    <button class="pill active" data-keyword="">All</button>
  </nav>

  <div id="filter-bar">
    <button id="verified-toggle" class="filter-btn" aria-pressed="false">
      <svg class="verified-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.9-2.19-3.34-2.19s-2.68.88-3.34 2.19c-1.39-.46-2.9-.2-3.91.81s-1.27 2.52-.81 3.91C1.63 9.33.75 10.57.75 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.9.81 3.91s2.52 1.27 3.91.81c.66 1.31 1.9 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.46 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z"/></svg>
      Verified only
    </button>
  </div>

  <form id="add-keyword-form">
    <input type="text" id="keyword-input" placeholder="Add keyword..." autocomplete="off">
    <button type="submit">+</button>
  </form>

  <div id="ptr-indicator">&#8635; Release to refresh</div>

  <main id="feed">
    <div id="tweet-list"></div>
    <button id="load-more" class="hidden">Load more</button>
  </main>

  <details id="account-panel">
    <summary>Manage X Accounts</summary>
    <div id="account-panel-content">
      <div id="account-list"></div>
      <form id="add-account-form">
        <input type="text"     name="username"       placeholder="@username" autocomplete="off">
        <input type="password" name="password"       placeholder="Password">
        <input type="email"    name="email"          placeholder="Email">
        <input type="password" name="email_password" placeholder="Email password">
        <input type="text"     name="cookies"        placeholder="Cookies: ct0=...; auth_token=...  (recommended)">
        <button type="submit">Add Account</button>
      </form>
      <p class="hint">Tip: get cookies from browser DevTools → Application → Cookies → x.com</p>
    </div>
  </details>

  <script src="/static/app.js"></script>
</body>
</html>
