[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 60

[deploy.env]
DATA_DIR = "/data"
FETCH_INTERVAL_MINUTES = "15"
TWEETS_PER_KEYWORD = "50"
FEED_PAGE_SIZE = "50"
